<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/tauri.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>santi.uninstaller</title>
    <script>
      // Apply saved theme before first paint (default: Catppuccin Mocha).
      (function () {
        var valid = ["light", "dark", "latte", "frappe", "macchiato", "mocha"];
        var t = localStorage.getItem("theme");
        if (valid.indexOf(t) === -1) t = "mocha";
        document.documentElement.setAttribute("data-theme", t);
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
